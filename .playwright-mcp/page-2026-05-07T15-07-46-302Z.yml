              - generic [ref=e140]: "Graphic: Sharlene Rood"
            - generic [ref=e141]:
              - paragraph [ref=e142]:
                - generic [ref=e143]: A Takealot client ordered and paid R14 000 for an iPhone 15, but received a calculator which sells for less than R400. Such mistakes are arguably inevitable given the order volumes South Africa’s biggest online retailer deals with. But they should be swiftly corrected. Weeks after reporting the issue, Takelot continued to refuse to accept the client’s return of the calculator. That’s when she approached Wendy Knowler for help.
              - list [ref=e144]:
                - listitem [ref=e145]:
                  - generic [ref=e146]:
                    - text: For more financial news, visit
                    - link "News24 Business" [ref=e147] [cursor=pointer]:
                      - /url: https://www.news24.com/business
                    - text: .
              - separator [ref=e148]
              - paragraph [ref=e149]: Product substitutions or mix-ups are not uncommon in online shopping.
              - paragraph [ref=e150]: Of course, some are more bizarre than others.
              - paragraph [ref=e151]: A standout case was that of Birgit Westermann-Winter of Cape Town, who in late 2024 ordered and paid for an office chair from Makro but received a box of biscuits instead.
              - paragraph [ref=e153]:
                - text: More recently, there were some interesting Takealot substitutions.
                - link "On social media" [ref=e154] [cursor=pointer]:
                  - /url: https://vt.tiktok.com/ZSaMefXjQ/
                - text: ", Precious* says she paid R14 000 for a PS5 and a controller, but was sent metal sock hangers instead."
              - paragraph [ref=e155]: And closer to home, my partner ordered a tech gadget – a wireless Bluetooth transmitter/receiver – and was sent a pack of teeth whitening strips.
              - paragraph [ref=e156]: Both cases were rectified.
              - paragraph [ref=e157]: "Asked about the crazy mix-ups, Takealot told me at the time:"
              - paragraph [ref=e159]: “On the occasion that customers don’t receive what they’ve ordered, we take full accountability and work swiftly to resolve them by collecting the incorrect item and delivering the right product as quickly as possible.
              - paragraph [ref=e160]: “Customers can report these issues through our customer help centre or by logging a ‘Not What I Ordered’ return on their Takealot profile.
              - paragraph [ref=e161]: “Our ecosystem operates with thousands of suppliers and sellers, multiple fulfilment centres, and complex logistics networks.
              - paragraph [ref=e162]: “This means there can be various contributing factors – from supplier or seller labelling inconsistencies and warehouse picking errors to delivery mix-ups.
              - paragraph [ref=e163]: “We continuously invest in enhancing our systems, processes, and quality controls to minimise these disruptions and maintain the trust our customers place in us every day.”
              - paragraph [ref=e164]: But for some reason, that robust system failed Thandi Bila.
              - paragraph [ref=e165]: She emailed me recently to say that she bought a R14 000 iPhone 15 on the Takealot site on 7 March but received a Casio calculator instead, a model which is currently being sold by several retailers for less than R400.
              - paragraph [ref=e166]: “I never opened or used the calculator because it wasn’t what I ordered,” she told me. She returned it to Takealot.
              - paragraph [ref=e167]: “But I received an email from Takealot saying that because I had used the calculator, they will return it.
              - paragraph [ref=e168]: “And they won’t refund my money.
              - paragraph [ref=e169]: “I’ve spent weeks sending emails all over, and they keep giving me the same response.”
              - paragraph [ref=e170]: "One of them reads: “Unfortunately, we cannot accept your return request as the return item is missing its accessories."
              - paragraph [ref=e171]: “Our returns policy states that a return can only be accepted if you return all the parts of the item you received.”
              - paragraph [ref=e172]: Not a word about the fact that she had actually ordered and paid R14 000 for an iPhone, not a calculator.
              - paragraph [ref=e173]: Last week, Bila told me that a Takealot driver had tried to return the calculator to her for the fourth time. “We just didn’t open the gate, so he left with it,” she said.
              - paragraph [ref=e175]: Responding to my query about the case, Takealot conceded that Bila “did not receive the correct item”.
              - paragraph [ref=e176]: “We have been attempting to reach her directly to resolve this issue and, based on her previous communication requesting a credit, we will be honouring that request.”
              - paragraph [ref=e177]: Takealot has credited Bila the R14 000.
              - generic [ref=e178]:
                - generic [ref=e179]: "The advice:"
                - paragraph [ref=e181]: If you order something online, especially an expensive item, if practically possible, open the box in front of the delivery person, and, if what you ordered is not inside it, photograph it in the hands of the delivery person. Such evidence will be invaluable in the event of a dispute.
              - paragraph
              - paragraph [ref=e182]: "*Details witheld for privacy."
